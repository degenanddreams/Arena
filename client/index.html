<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      height: 100%;
      overflow: hidden;
    }
    #game {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    canvas {
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>

  <!-- Socket.io client (served automatically by the server) -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Asset manifest (generated by scripts/prepare_assets.js) -->
  <script src="assets/asset-manifest.js"></script>

  <!-- Config -->
  <script src="js/config/timing.js"></script>
  <script src="js/config/xpTable.js"></script>
  <script src="js/config/items.js"></script>
  <script src="js/config/dummies.js"></script>
  <script src="js/config/boss.js"></script>
  <script src="js/config/profanity.js"></script>

  <!-- Systems -->
  <script src="js/systems/Pathfinding.js"></script>
  <script src="js/systems/CombatSystem.js"></script>
  <script src="js/systems/XPSystem.js"></script>
  <script src="js/systems/FoodSystem.js"></script>
  <script src="js/systems/BossSystem.js"></script>
  <script src="js/systems/NetworkManager.js"></script>

  <!-- UI components -->
  <script src="js/ui/SkillsPanel.js"></script>
  <script src="js/ui/CombatStylePanel.js"></script>
  <script src="js/ui/InventoryPanel.js"></script>
  <script src="js/ui/EquipmentPanel.js"></script>
  <script src="js/ui/PlayerInfoPanel.js"></script>
  <script src="js/ui/NpcPanels.js"></script>
  <script src="js/ui/ChatLog.js"></script>
  <script src="js/ui/WagerUI.js"></script>

  <!-- Scenes -->
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/CharacterCreateScene.js"></script>
  <script src="js/scenes/GameScene.js"></script>
  <script src="js/scenes/UIScene.js"></script>
  <script src="js/scenes/TutorialScene.js"></script>

  <!-- Game entry -->
  <script src="js/main.js"></script>
</body>
</html>
